<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center" (click)="goToHome()" style="cursor: pointer;">
      <img src="logo.png" alt="TalentLink" height="40" class="me-2">
      <span class="fs-5 fw-bold">TalentLink</span>
    </a>
    
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item" *ngIf="currentUser && isAdminPage && isHrOrAdmin()">
          <a class="nav-link" [class.active]="activeAdminTab==='activeJobs'" (click)="goToDashboardTab('activeJobs')" style="cursor: pointer;">
            <i class="fas fa-chart-bar me-1"></i> Active Jobs
          </a>
        </li>

        <li class="nav-item" *ngIf="currentUser && isAdminPage && isHrOrAdmin()">
          <a class="nav-link" [class.active]="activeAdminTab==='jobs'" (click)="goToDashboardTab('jobs')" style="cursor: pointer;">
            <i class="fas fa-briefcase me-1"></i> Manage Jobs
          </a>
        </li>

        <li class="nav-item" *ngIf="currentUser && isAdminPage && isAdmin()">
          <a class="nav-link" [class.active]="activeAdminTab==='users'" (click)="goToDashboardTab('users')" style="cursor: pointer;">
            <i class="fas fa-users me-1"></i> Users
          </a>
        </li>

        <li class="nav-item" *ngIf="currentUser && isAdminPage && isAdmin()">
          <a class="nav-link" [class.active]="activeAdminTab==='roles'" (click)="goToDashboardTab('roles')" style="cursor: pointer;">
            <i class="fas fa-user-shield me-1"></i> Roles
          </a>
        </li>

               
        <li class="nav-item" *ngIf="!currentUser">
          <button class="btn btn-outline-light ms-2" (click)="goToLogin()">
            <i class="fas fa-sign-in-alt me-1"></i> Login
          </button>
        </li>
        
        <li class="nav-item dropdown user-menu" *ngIf="currentUser">
          <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button"

            <span class="profile-avatar me-2">{{ getInitials() }}</span>
            <span>{{ currentUser.name }}</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
            <li>
              <a class="dropdown-item" (click)="goToDashboard()" style="cursor: pointer;">
                <i class="fas fa-tachometer-alt me-2"></i> Dashboard
              </a>
            </li>
            <li>
              <a class="dropdown-item" (click)="goToChangePassword()" style="cursor: pointer;">
                <i class="fas fa-key me-2"></i> Change Password
              </a>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <a class="dropdown-item" (click)="logout()" style="cursor: pointer;">
                <i class="fas fa-sign-out-alt me-2"></i> Logout
              </a>
            </li>
          </ul>
        </li>
      </ul>
