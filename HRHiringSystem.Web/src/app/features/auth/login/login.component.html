<div class="login-container">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-md-5 col-lg-4">
        <button class="btn btn-link mb-3 ps-0" (click)="goBack()">
          <i class="fas fa-arrow-left me-2"></i> Back to Home
        </button>

        <div class="card shadow-lg">
          <div class="card-body p-5">
            <div class="text-center mb-4">
              <div class="logo-container mx-auto mb-3">
                <i class="fas fa-briefcase fa-3x"></i>
              </div>
              <h3 class="fw-bold">Admin / HR Login</h3>
              <p class="text-muted">Access your hiring dashboard</p>
            </div>

            <div *ngIf="error" class="alert alert-danger" role="alert">
              <i class="fas fa-exclamation-circle me-2"></i> {{ error }}
            </div>

            <form [formGroup]="loginForm" (ngSubmit)="login()">
              <div class="mb-3">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text">
                    <i class="fas fa-envelope"></i>
                  </span>
                  <input 
                    type="email" 
                    class="form-control" 
                    formControlName="email"
                    placeholder="Enter your email"
                    [class.is-invalid]="f['email'].invalid && f['email'].touched">
                </div>
                <div class="invalid-feedback d-block" *ngIf="f['email'].invalid && f['email'].touched">
                  Please enter a valid email address
                </div>
              </div>

              <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-group">
                  <span class="input-group-text">
                    <i class="fas fa-lock"></i>
                  </span>
                  <input 
                    type="password" 
                    class="form-control" 
                    formControlName="password"
                    placeholder="Enter your password"
                    [class.is-invalid]="f['password'].invalid && f['password'].touched">
                </div>
                <div class="invalid-feedback d-block" *ngIf="f['password'].invalid && f['password'].touched">
                  Password must be at least 6 characters
                </div>
              </div>

              <button 
                type="submit" 
                class="btn btn-primary w-100 mb-3" 
                [disabled]="loading">
                <span *ngIf="!loading">
                  <i class="fas fa-sign-in-alt me-2"></i> Login
                </span>
                <span *ngIf="loading">
                  <span class="spinner-border spinner-border-sm me-2"></span> Logging in...
                </span>
              </button>
            </form>

            <div class="text-center">
              <small class="text-muted">
                <i class="fas fa-shield-alt me-1"></i> Secure admin access only
              </small>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
